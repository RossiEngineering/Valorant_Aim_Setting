<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="description" content="발로란트 유저를 위한 맞춤형 에임 감도(PSA) 및 eDPI 계산기입니다. 나에게 딱 맞는 최적의 감도를 찾아보세요!">
		<meta name="keywords" content="발로란트, 발로란트 감도, 에임 감도, PSA, eDPI, 발로란트 감도 계산기, 발로란트 eDPI">
		<meta property="og:title" content="발로란트 맞춤 감도(PSA) 계산기">
		<meta property="og:description" content="내 마우스 DPI와 인게임 감도로 완벽한 에임 감도를 찾아보세요!">
		<meta property="og:type" content="website">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>발로란트 맞춤 감도(PSA) 계산기</title>
				<style>
					/* 발로란트 스타일 CSS 디자인 */
					body {
					background-color: #0f1923; /* 발로란트 배경색 */
					color: #ece8e1; /* 발로란트 텍스트색 */
					font-family: 'Malgun Gothic', sans-serif;
					text-align: center;
					margin: 0;
					padding: 20px;
					}
					.container {
					max-width: 600px;
					margin: 40px auto;
					background-color: #1f2731;
					padding: 30px;
					border-radius: 8px;
					box-shadow: 0 4px 15px rgba(0,0,0,0.5);
					}
					h1 { color: #ff4655; /* 발로란트 레드 */ }
					input {
					padding: 10px;
					margin: 10px;
					width: 80%;
					border: 2px solid #ece8e1;
					background-color: #0f1923;
					color: white;
					font-size: 16px;
					}
					button {
					background-color: #ff4655;
					color: white;
					border: none;
					padding: 12px 24px;
					font-size: 16px;
					font-weight: bold;
					cursor: pointer;
					margin: 10px;
					border-radius: 4px;
					transition: 0.3s;
					}
					button:hover { background-color: #e03e4d; }
					.hidden { display: none; }
					.highlight { color: #ff4655; font-size: 24px; font-weight: bold; }
					.box { background-color: #0f1923; padding: 15px; margin: 15px 0; border-left: 5px solid #ff4655; }
				</style>
			</head>
	<body>

		<div class="container">
			<h1>🎮 발로란트 eDPI & PSA 분석기</h1>

			<div id="step-input">
				<p>현재 사용 중인 마우스 설정과 인게임 감도를 입력하세요.</p>
				<input type="number" id="input-dpi" placeholder="마우스 DPI (예: 800)">
					<input type="number" step="0.01" id="input-sens" placeholder="인게임 감도 (예: 0.35)">
						<br>
							<button onclick="startTest()">eDPI 분석 및 테스트 시작</button>
						</div>

			<div id="step-test" class="hidden">
				<div class="box" id="edpi-result"></div>
				<h2 id="iteration-text">단계 1 / 7</h2>
				<p>
					훈련장에서 아래 두 감도를 쏘아보고 <strong>더 편한 감도</strong>를 선택하세요.
				</p>

				<div>
					<h3>
						👉 1번 (Low 감도): <span id="val-low" class="highlight"></span>
					</h3>
					<button onclick="choose('low')">1번이 더 편함</button>
				</div>

				<div style="margin-top: 20px;">
					<h3>
						👉 2번 (High 감도): <span id="val-high" class="highlight"></span>
					</h3>
					<button onclick="choose('high')">2번이 더 편함</button>
				</div>
			</div>

			<div id="step-result" class="hidden">
				<h2>🎉 테스트 완료!</h2>
				<p>유저님을 위한 최종 맞춤 감도입니다.</p>
				<div class="box">
					<p>
						추천 인게임 감도: <span id="final-sens" class="highlight"></span>
					</p>
					<p>
						최종 eDPI: <span id="final-edpi" style="font-weight:bold;"></span>
					</p>
				</div>
				<p>이제 게임을 하면서 0.01 단위로만 미세 조정하세요!</p>
				<button onclick="location.reload()">다시 테스트하기</button>
			</div>
		</div>

		<script>
			// 변수 세팅
			let userDPI = 0;
			let currentBase = 0;
			let iteration = 1;
			let maxIterations = 7;
			let low = 0;
			let high = 0;

			// 1. 테스트 시작 함수
			function startTest() {
			userDPI = parseInt(document.getElementById("input-dpi").value);
			let sens = parseFloat(document.getElementById("input-sens").value);

			if(!userDPI || !sens) {
			alert("DPI와 감도를 정확히 숫자로 입력해주세요!");
			return;
			}

			currentBase = sens;
			let edpi = userDPI * sens;

			// eDPI 진단 메시지 작성
			let diagMsg = `유저님의 현재 eDPI는 <strong>${edpi.toFixed(1)}</strong> 입니다.<br>
				`;
				if(edpi < 200) diagMsg += "💡 진단: 프로게이머 평균 대비 '저감도'입니다.";
        else if(edpi <= 400) diagMsg += "💡 진단: 가장 이상적인 '평균 감도' 대역입니다.";
				else diagMsg += "💡 진단: 프로게이머 평균 대비 '고감도'입니다.";

				document.getElementById("edpi-result").innerHTML = diagMsg;

				// 화면 전환 (입력창 숨기고 테스트창 표시)
				document.getElementById("step-input").classList.add("hidden");
				document.getElementById("step-test").classList.remove("hidden");

				updateValues(); // 첫 번째 계산 실행
				}

				// 2. High / Low 값 계산 및 화면 업데이트
				function updateValues() {
				if(iteration > maxIterations) {
				showResult();
				return;
				}

				low = currentBase * 0.5;
				high = currentBase * 1.5;

				document.getElementById("iteration-text").innerText = `단계 ${iteration} / ${maxIterations}`;
				document.getElementById("val-low").innerText = low.toFixed(3);
				document.getElementById("val-high").innerText = high.toFixed(3);
				}

				// 3. 유저 선택 처리 (핵심 알고리즘)
				function choose(choice) {
				if(choice === 'low') {
				currentBase = (currentBase + low) / 2;
				} else if(choice === 'high') {
				currentBase = (currentBase + high) / 2;
				}
				iteration++;
				updateValues();
				}

				// 4. 최종 결과 표시
				function showResult() {
				document.getElementById("step-test").classList.add("hidden");
				document.getElementById("step-result").classList.remove("hidden");

				document.getElementById("final-sens").innerText = currentBase.toFixed(3);
				document.getElementById("final-edpi").innerText = (currentBase * userDPI).toFixed(1);
				}
			</script>

	</body>
</html>
